# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    mobman_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

mobman_arm_controller:
  ros__parameters:
    joints:
      - arm_base_link1_joint
      - arm_link1_link2p1_joint
      - arm_link2p3_link3_joint
      - arm_link3_link4_joint
      - arm_link4_link5_joint
      - arm_link5_link6_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity